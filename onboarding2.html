<!-- onboarding2.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Real-Time Tracking - HRTC</title>
  <style>
    body {
      margin: 0;
      background-color: #f2f2f2;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .phone-frame {
  max-width: 1000px;
  margin: 40px auto;
  padding: 40px;
  background-color: #f9f9f9;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}


    .image {
      width: 100%;
      max-height: 250px;
      object-fit: contain;
      margin-top: 10px;
    }

    .content {
      text-align: center;
    }

    .title {
      font-size: 18px;
      font-weight: bold;
      margin-top: 20px;
    }

    .description {
      font-size: 13px;
      color: #666;
      margin-top: 10px;
      padding: 0 10px;
    }

    .navigation {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 10px;
      margin-bottom: 10px;
    }

    .skip {
      font-size: 14px;
      color: #0077cc;
      text-decoration: none;
    }

    .dots {
      display: flex;
      gap: 5px;
    }

    .dot {
      width: 8px;
      height: 8px;
      background-color: #ccc;
      border-radius: 50%;
    }

    .dot.active {
      background-color: #0077cc;
    }

    .next {
      font-size: 20px;
      text-decoration: none;
      color: #0077cc;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="phone-frame">
    <img
      class="image"
      src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTYW7_kSNQPP6lAizVcSlPgga28hlc3ynm9rg&s"
      alt="Real-Time Tracking Illustration"
    />

    <div class="content">
      <div class="title">Real-Time Tracking</div>
      <div class="description">
        Our system utilizes advanced GPS technology and traffic management data to help you track your desired bus in real-time.
        Know exactly where your bus is and when it will arrive at your stop.
      </div>
    </div>

    <div class="navigation">
      <a href="index.html" class="skip">Skip</a>
      <div class="dots">
        <div class="dot"></div>
        <div class="dot active"></div>
        <div class="dot"></div>
      </div>
      <!-- ✅ FIXED: Link to 3rd onboarding screen -->
      <a href="onboarding3.html" class="next">→</a>
    </div>
  </div>
</body>
</html>
