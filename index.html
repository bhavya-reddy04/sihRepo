<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Splash Screen</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      background: #ffffff;
      font-family: Arial, sans-serif;
    }

    h1 {
      color: #0077cc;
      font-size: 24px;
      margin-bottom: 20px;
    }

    .bus-container {
      width: 100%;
      overflow: hidden;
      position: relative;
      height: 150px;
    }

    .bus {
      width: 200px;
      position: absolute;
      bottom: 0;
      left: -220px; /* start off screen */
      animation: moveBus 5s linear forwards;
    }

    @keyframes moveBus {
      from {
        left: -220px;
      }
      to {
        left: calc(100% + 220px); /* move fully across screen */
      }
    }

    p {
      margin-top: 30px;
      color: #777;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>Welcome to RTC</h1>

  <div class="bus-container">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT_KPt3imh_-7e47sbco3TVpcYadF6tqo-5QA&s" 
         alt="Bus" class="bus">
  </div>

  <p>Arrive in Style, On Time, Every Time</p>

  <script>
    // Redirect to onboarding1.html after 5 seconds
    setTimeout(() => {
      window.location.href = "onboarding1.html";
    }, 5000);
  </script>
</body>
</html>
