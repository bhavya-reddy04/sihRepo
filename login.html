<!-- login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login - HRTC</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to bottom right, #6a11cb, #2575fc, #20e3b2);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .login-container {
      background: white;
      padding: 40px 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .login-container h1 {
      font-size: 28px;
      margin-bottom: 10px;
      color: #333;
    }

    .login-container p {
      margin-bottom: 30px;
      font-size: 14px;
      color: #666;
    }

    .login-container input[type="email"],
    .login-container input[type="password"] {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }

    .forgot-password {
      text-align: right;
      font-size: 12px;
      margin-bottom: 20px;
      color: #0077cc;
      text-decoration: none;
      display: block;
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      background-color: #000;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 25px;
    }

    .divider {
      position: relative;
      margin: 20px 0;
      text-align: center;
      font-size: 14px;
      color: #888;
    }

    .divider::before,
    .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background-color: #ccc;
    }

    .divider::before {
      left: 0;
    }

    .divider::after {
      right: 0;
    }

    .social-login {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 25px;
    }

    .social-login img {
      width: 40px;
      height: 40px;
      cursor: pointer;
    }

    .register-link {
      font-size: 14px;
      color: #555;
    }

    .register-link a {
      color: #0077cc;
      text-decoration: none;
      font-weight: bold;
    }

    .register-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>RTC</h1>
    <p>Welcome to the RTC login page</p>


  <form onsubmit="handleLogin(event)">
   <input type="email" placeholder="Email" required />
   <input type="password" placeholder="Password" required />
   <a href="#" class="forgot-password">Forgot Password?</a>
   <button type="submit" class="login-btn">Sign In</button>
  </form>


    <div class="divider">Or continue with</div>

    <div class="social-login">
      <img src="https://cdn-icons-png.flaticon.com/512/281/281764.png" alt="Google" title="Login with Google" />
      <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="Facebook" title="Login with Facebook" />
      <img src="https://cdn-icons-png.flaticon.com/512/597/597177.png" alt="Phone" title="Login with Phone" />
    </div>

    <div class="register-link">
      Not a member? <a href="#">Register now</a>
    </div>
  </div>
<script>
  function handleLogin(event) {
    event.preventDefault(); // Prevent form from submitting
    // Optionally, add some validation here
    window.location.href = "home.html"; // Redirect to home page
  }
</script>
</body>
</html>
