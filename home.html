<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HRTC Dashboard</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1400&q=80') no-repeat center center;
      background-size: cover;
      color: #fff;
    }

    .overlay {
      background-color: rgba(0, 0, 0, 0.5);
      min-height: 100vh;
      padding: 20px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
    }

    .menu {
      font-size: 24px;
      cursor: pointer;
    }

    .title {
      font-size: 20px;
      font-weight: bold;
    }

    .bus-info {
      background-color: #fff;
      color: #000;
      border-radius: 12px;
      padding: 20px;
      margin: 20px auto;
      max-width: 400px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .bus-info input,
    .bus-info button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    .bus-info button {
      background-color: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }

    .dates {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      margin-top: 10px;
    }

    .nearby {
      text-align: center;
      margin-top: 40px;
    }

    .nearby h3 {
      margin-bottom: 20px;
    }

    .icons {
      display: flex;
      justify-content: space-around;
      flex-wrap: wrap;
      max-width: 400px;
      margin: 0 auto;
    }

    .icon-item {
      text-align: center;
      margin: 10px;
    }

    .icon-item img {
      width: 50px;
      height: 50px;
    }

    .nearby button {
      margin-top: 20px;
      padding: 10px 20px;
      border-radius: 6px;
      border: none;
      background-color: #007bff;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="overlay">
    <header>
      <div class="menu">☰</div>
      <div class="title">Home</div>
      <form action="results.html" method="GET">
        <input type="text" name="source" placeholder="Enter Source" required>
        <input type="text" name="destination" placeholder="Enter Destination" required>
        <input type="date" name="date">
        <button type="submit">Search Buses</button>
       </form>

    </header>

    <section class="bus-info">
      <input type="text" placeholder="Enter Source" />
      <input type="text" placeholder="Enter Destination" />
      <input type="date" value="2025-09-16" />

      <div class="dates">
        <span>Today</span>
        <span>Tomorrow</span>
      </div>

      <button>Search Buses</button>
    </section>
